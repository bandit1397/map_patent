<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>트랙 기반 최단경로 (출발/도착 선택)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-gpx@1.7.0/gpx.js"></script>

<style>
body { margin:0; }
#map { height:100vh; }
#info {
  position:fixed;
  top:10px;
  left:10px;
  background:white;
  padding:10px;
  border-radius:5px;
  z-index:999;
}
</style>
</head>

<body>

<div id="info">
① 지도 클릭 = 출발점<br>
② WPT 클릭 = 도착점<br>
👉 트랙 최단경로 계산
</div>

<div id="map"></div>

<script>

// ======================
// 1. 지도
// ======================
const map = L.map('map').setView([37.5350,126.8685], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ======================
// 2. 변수
// ======================
let graph = {};
let wptMarkers = [];
let pathLine = null;

let startNode = null;

const blueIcon = L.icon({
  iconUrl:"https://maps.google.com/mapfiles/ms/icons/blue-dot.png",
  iconSize:[32,32]
});
const redIcon = L.icon({
  iconUrl:"https://maps.google.com/mapfiles/ms/icons/red-dot.png",
  iconSize:[32,32]
});
const greenIcon = L.icon({
  iconUrl:"https://maps.google.com/mapfiles/ms/icons/green-dot.png",
  iconSize:[32,32]
});

// ======================
// 3. GPX 로드
// ======================
new L.GPX("galsan_demo.gpx", {
  async:true,
  polyline_options:{ color:"red", weight:4 }
})
.on("loaded", function(e){

  map.fitBounds(e.target.getBounds());

  extractGraph(e.target);
  loadWPT();

})
.addTo(map);

// ======================
// 4. 그래프 생성
// ======================
function extractGraph(gpx){

  graph = {};

  function walk(layer){

    if(layer instanceof L.Polyline){

      const pts = layer.getLatLngs();

      for(let i=0;i<pts.length-1;i++){

        const a = pts[i];
        const b = pts[i+1];

        const A = `${a.lat.toFixed(6)},${a.lng.toFixed(6)}`;
        const B = `${b.lat.toFixed(6)},${b.lng.toFixed(6)}`;

        if(!graph[A]) graph[A]=[];
        if(!graph[B]) graph[B]=[];

        graph[A].push(B);
        graph[B].push(A);
      }
    }

    if(layer.eachLayer){
      layer.eachLayer(walk);
    }
  }

  walk(gpx);

  console.log("그래프:", Object.keys(graph).length);
}

// ======================
// 5. WPT 로드 + 클릭 이벤트
// ======================
function loadWPT(){

  fetch("galsan_demo.gpx")
  .then(r=>r.text())
  .then(text=>{

    const xml = new DOMParser().parseFromString(text,"application/xml");
    const wpts = xml.getElementsByTagName("wpt");

    for(let i=0;i<wpts.length;i++){

      const lat = parseFloat(wpts[i].getAttribute("lat"));
      const lng = parseFloat(wpts[i].getAttribute("lon"));
      const name = wpts[i].getElementsByTagName("name")[0].textContent;

      const marker = L.marker([lat,lng],{icon:blueIcon})
        .bindPopup(name)
        .addTo(map);

      const wpt = {lat,lng,name,marker};

      // 🔥 핵심: WPT 클릭 → 도착점
      marker.on("click", function(){

        if(!startNode){
          alert("먼저 출발점을 클릭하세요");
          return;
        }

        // 도착 노드
        const endNode = snap(lat,lng);

        // 최단 경로
        const path = shortest(startNode,endNode);

        draw(path);

        marker.setIcon(redIcon);
        marker.openPopup();
      });

      wptMarkers.push(wpt);
    }

    console.log("WPT:", wptMarkers.length);
  });
}

// ======================
// 6. 스냅
// ======================
function snap(lat,lng){

  let min=Infinity, best=null;

  Object.keys(graph).forEach(n=>{
    const [a,b]=n.split(",").map(Number);
    const d=(lat-a)**2+(lng-b)**2;

    if(d<min){
      min=d;
      best=n;
    }
  });

  return best;
}

// ======================
// 7. 다익스트라
// ======================
function shortest(start,end){

  let dist={},prev={},Q=[start];

  Object.keys(graph).forEach(n=>{
    dist[n]=Infinity;
    prev[n]=null;
  });

  dist[start]=0;

  while(Q.length){

    let cur=Q.shift();

    if(cur===end) break;

    graph[cur].forEach(n=>{

      const [a,b]=cur.split(",").map(Number);
      const [c,d]=n.split(",").map(Number);

      const alt = dist[cur] + Math.hypot(a-c,b-d);

      if(alt < dist[n]){
        dist[n]=alt;
        prev[n]=cur;
        Q.push(n);
      }
    });
  }

  let path=[],u=end;

  while(u){
    path.unshift(u);
    u=prev[u];
  }

  return path;
}

// ======================
// 8. 경로 그리기
// ======================
function draw(path){

  if(pathLine) map.removeLayer(pathLine);

  const pts = path.map(p=>{
    const [a,b]=p.split(",").map(Number);
    return [a,b];
  });

  pathLine = L.polyline(pts,{
    color:"blue",
    weight:5
  }).addTo(map);
}

// ======================
// 9. 지도 클릭 → 출발점 설정
// ======================
map.on("click", function(e){

  const snapped = snap(e.latlng.lat,e.latlng.lng);

  startNode = snapped;

  const [lat,lng] = snapped.split(",").map(Number);

  L.marker([lat,lng],{
    icon:greenIcon
  })
  .addTo(map)
  .bindPopup("출발점")
  .openPopup();

});

</script>

</body>
</html>
