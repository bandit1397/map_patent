<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>완전 동작 산악 경로 시스템</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-gpx@1.7.0/gpx.js"></script>

<style>
body { margin:0; }
#map { height:100vh; }
#info {
  position:fixed;
  top:10px;
  left:10px;
  background:white;
  padding:10px;
  border-radius:5px;
  z-index:999;
}
</style>
</head>

<body>

<div id="info">📍 클릭 → 트랙 위 최단경로</div>
<div id="map"></div>

<script>

// ======================
// 1. 지도
// ======================
const map = L.map('map').setView([37.5350,126.8685], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ======================
// 2. 변수
// ======================
let graph = {};
let wptMarkers = [];
let pathLine = null;

const blueIcon = L.icon({
  iconUrl:"https://maps.google.com/mapfiles/ms/icons/blue-dot.png",
  iconSize:[32,32]
});
const redIcon = L.icon({
  iconUrl:"https://maps.google.com/mapfiles/ms/icons/red-dot.png",
  iconSize:[32,32]
});

// ======================
// 3. GPX 로드
// ======================
new L.GPX("galsan_demo.gpx", {
  async:true,
  polyline_options:{ color:"red", weight:4 }
})
.on("loaded", function(e){

  map.fitBounds(e.target.getBounds());

  // 👉 트랙 그래프 생성 (핵심)
  extractTrackGraph(e.target);

  // 👉 WPT 로드
  loadWPT();

})
.on("error", function(){
  alert("❌ GPX 파일 경로 확인하세요");
})
.addTo(map);

// ======================
// 4. 트랙 → 그래프
// ======================
function extractTrackGraph(gpx){

  graph = {};

  function process(layer){

    if(layer instanceof L.Polyline){

      const latlngs = layer.getLatLngs();

      for(let i=0;i<latlngs.length-1;i++){

        const a = latlngs[i];
        const b = latlngs[i+1];

        const A = `${a.lat.toFixed(6)},${a.lng.toFixed(6)}`;
        const B = `${b.lat.toFixed(6)},${b.lng.toFixed(6)}`;

        if(!graph[A]) graph[A]=[];
        if(!graph[B]) graph[B]=[];

        graph[A].push(B);
        graph[B].push(A);
      }
    }

    if(layer.eachLayer){
      layer.eachLayer(process);
    }
  }

  process(gpx);

  console.log("그래프 노드:", Object.keys(graph).length);
}

// ======================
// 5. WPT 로드
// ======================
function loadWPT(){

  fetch("galsan_demo.gpx")
  .then(r=>r.text())
  .then(text=>{

    const xml = new DOMParser().parseFromString(text,"application/xml");
    const wpts = xml.getElementsByTagName("wpt");

    for(let i=0;i<wpts.length;i++){

      const lat = parseFloat(wpts[i].getAttribute("lat"));
      const lng = parseFloat(wpts[i].getAttribute("lon"));
      const name = wpts[i].getElementsByTagName("name")[0].textContent;

      const m = L.marker([lat,lng],{icon:blueIcon})
        .bindPopup(name)
        .addTo(map);

      wptMarkers.push({lat,lng,name,marker:m});
    }

    console.log("WPT:", wptMarkers.length);
  });
}

// ======================
// 6. 스냅
// ======================
function snap(lat,lng){

  let min=Infinity, best=null;

  Object.keys(graph).forEach(n=>{
    const [a,b]=n.split(",").map(Number);
    const d=(lat-a)**2+(lng-b)**2;
    if(d<min){min=d;best=n;}
  });

  return best;
}

// ======================
// 7. 다익스트라
// ======================
function shortest(start,end){

  let dist={},prev={},Q=[start];

  Object.keys(graph).forEach(n=>{
    dist[n]=Infinity;
    prev[n]=null;
  });

  dist[start]=0;

  while(Q.length){

    let cur=Q.shift();

    if(cur===end) break;

    graph[cur].forEach(n=>{

      const [a,b]=cur.split(",").map(Number);
      const [c,d]=n.split(",").map(Number);

      const alt = dist[cur] + Math.hypot(a-c,b-d);

      if(alt < dist[n]){
        dist[n]=alt;
        prev[n]=cur;
        Q.push(n);
      }
    });
  }

  let path=[],u=end;
  while(u){ path.unshift(u); u=prev[u]; }

  return path;
}

// ======================
// 8. 경로 표시
// ======================
function draw(path){

  if(pathLine) map.removeLayer(pathLine);

  const pts = path.map(p=>{
    const [a,b]=p.split(",").map(Number);
    return [a,b];
  });

  pathLine = L.polyline(pts,{color:"blue",weight:5}).addTo(map);
}

// ======================
// 9. 클릭
// ======================
map.on("click", e=>{

  if(wptMarkers.length===0){
    alert("WPT 로딩중");
    return;
  }

  const start = snap(e.latlng.lat,e.latlng.lng);

  let target=null, min=Infinity;

  wptMarkers.forEach(w=>{
    const d=(e.latlng.lat-w.lat)**2+(e.latlng.lng-w.lng)**2;
    if(d<min){min=d;target=w;}
  });

  const end = snap(target.lat,target.lng);

  const path = shortest(start,end);

  draw(path);

  target.marker.setIcon(redIcon);
  target.marker.openPopup();
});

</script>

</body>
</html>
