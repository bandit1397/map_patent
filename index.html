<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>산악 위치 특정 시스템 (핵심 구조)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-gpx@1.7.0/gpx.js"></script>

<style>
  body { margin:0; }
  #map { height:100vh; }
</style>
</head>

<body>
<div id="map"></div>

<script>
// ===============================
// 1. 지도 초기화
// ===============================
const map = L.map('map').setView([37.38,126.65], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

// ===============================
// 2. GPX 트랙 로드
// ===============================
const gpxLayer = new L.GPX("routes/mountain.gpx", {
  async: true,
  polyline_options: { color: "red", weight: 4 }
}).on('loaded', function(e){
  map.fitBounds(e.target.getBounds());
}).addTo(map);

// ===============================
// 3. WPT 데이터 (가로등)
// ===============================
const wptData = [
  {name:"가로등1", lat:37.381, lng:126.651},
  {name:"가로등2", lat:37.382, lng:126.652},
  {name:"가로등3", lat:37.383, lng:126.653}
];

let wptMarkers = [];

wptData.forEach(w=>{
  const m = L.marker([w.lat, w.lng])
    .bindPopup(w.name)
    .addTo(map);

  wptMarkers.push({
    name: w.name,
    lat: w.lat,
    lng: w.lng,
    marker: m
  });
});

// ===============================
// 4. 핵심 알고리즘 (특허 포인트)
// ===============================

// 거리 계산 함수
function getDistance(a, b){
  const dx = a.lat - b.lat;
  const dy = a.lng - b.lng;
  return dx*dx + dy*dy;
}

// 클릭 → 가장 가까운 WPT 찾기
map.on("click", function(e){

  const clicked = {
    lat: e.latlng.lat,
    lng: e.latlng.lng
  };

  let nearest = null;
  let minDist = Infinity;

  wptMarkers.forEach(w=>{
    const dist = getDistance(clicked, w);
    if(dist < minDist){
      minDist = dist;
      nearest = w;
    }
  });

  // 결과 표시
  if(nearest){
    nearest.marker.openPopup();

    L.popup()
      .setLatLng(e.latlng)
      .setContent("가장 가까운 기준점: " + nearest.name)
      .openOn(map);
  }
});

</script>
</body>
</html>
