<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>산악 위치 특정 + 최단경로 시스템</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-gpx@1.7.0/gpx.js"></script>

<style>
  body { margin:0; }
  #map { height:100vh; }
  #info {
    position: fixed;
    top: 10px;
    left: 10px;
    background: white;
    padding: 10px;
    border-radius: 5px;
    font-size: 14px;
    z-index: 999;
  }
</style>
</head>

<body>

<div id="info">
📍 클릭 → 가장 가까운 가로등 + 트랙 기반 최단경로 표시
</div>

<div id="map"></div>

<script>
// ===============================
// 1. 지도 초기화
// ===============================
const map = L.map('map').setView([37.5345,126.8685], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

// ===============================
// 2. 변수 선언
// ===============================
let wptMarkers = [];
let lastSelectedMarker = null;
let lastPopup = null;
let graph = {};
let pathLine = null;

// 아이콘
const blueIcon = L.icon({
  iconUrl: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png",
  iconSize: [32,32]
});

const redIcon = L.icon({
  iconUrl: "https://maps.google.com/mapfiles/ms/icons/red-dot.png",
  iconSize: [32,32]
});

// ===============================
// 3. GPX 트랙 로드
// ===============================
new L.GPX("galsan_demo.gpx", {
  async: true,
  polyline_options: {
    color: "red",
    weight: 4
  }
})
.on("loaded", function(e){

  map.fitBounds(e.target.getBounds());

  // ===============================
  // 4. 트랙 → 그래프 변환
  // ===============================
  buildGraphFromGPX(e.target);

  // ===============================
  // 5. WPT XML 파싱
  // ===============================
  fetch("galsan_demo.gpx")
    .then(res => res.text())
    .then(xmlText => {

      const parser = new DOMParser();
      const xml = parser.parseFromString(xmlText, "application/xml");

      const wpts = xml.getElementsByTagName("wpt");

      wptMarkers = [];

      for(let i=0; i<wpts.length; i++){

        const lat = parseFloat(wpts[i].getAttribute("lat"));
        const lng = parseFloat(wpts[i].getAttribute("lon"));
        const name = wpts[i].getElementsByTagName("name")[0].textContent;

        const marker = L.marker([lat, lng], { icon: blueIcon })
          .bindPopup(name)
          .addTo(map);

        wptMarkers.push({
          name, lat, lng, marker
        });
      }

      console.log("✅ WPT 로드 완료:", wptMarkers.length);
    });
})
.addTo(map);

// ===============================
// 6. 그래프 생성
// ===============================
function buildGraphFromGPX(gpxLayer){

  graph = {};

  gpxLayer.eachLayer(layer => {

    if(layer instanceof L.Polyline){

      const latlngs = layer.getLatLngs();

      for(let i=0; i<latlngs.length-1; i++){

        const a = latlngs[i];
        const b = latlngs[i+1];

        const keyA = `${a.lat.toFixed(6)},${a.lng.toFixed(6)}`;
        const keyB = `${b.lat.toFixed(6)},${b.lng.toFixed(6)}`;

        if(!graph[keyA]) graph[keyA] = [];
        if(!graph[keyB]) graph[keyB] = [];

        graph[keyA].push(keyB);
        graph[keyB].push(keyA);
      }
    }
  });

  console.log("그래프 생성:", Object.keys(graph).length);
}

// ===============================
// 7. 거리 계산
// ===============================
function getDistance(a, b){
  const dx = a.lat - b.lat;
  const dy = a.lng - b.lng;
  return dx*dx + dy*dy;
}

// ===============================
// 8. 가장 가까운 노드 찾기
// ===============================
function findNearestNode(lat, lng){
  let minDist = Infinity;
  let nearest = null;

  Object.keys(graph).forEach(node=>{
    const [nLat,nLng] = node.split(",").map(Number);
    const dist = (lat-nLat)**2 + (lng-nLng)**2;

    if(dist < minDist){
      minDist = dist;
      nearest = node;
    }
  });

  return nearest;
}

// ===============================
// 9. 최단 경로 (다익스트라)
// ===============================
function findShortestPath(start, end){

  let dist = {};
  let prev = {};
  let queue = [];

  Object.keys(graph).forEach(node=>{
    dist[node] = Infinity;
    prev[node] = null;
  });

  dist[start] = 0;
  queue.push(start);

  while(queue.length){

    let current = queue.shift();

    if(current === end) break;

    graph[current].forEach(next=>{

      const [lat1,lng1] = current.split(",").map(Number);
      const [lat2,lng2] = next.split(",").map(Number);

      const d = Math.sqrt((lat1-lat2)**2 + (lng1-lng2)**2);

      const alt = dist[current] + d;

      if(alt < dist[next]){
        dist[next] = alt;
        prev[next] = current;
        queue.push(next);
      }
    });
  }

  let path = [];
  let u = end;

  while(u){
    path.unshift(u);
    u = prev[u];
  }

  return path;
}

// ===============================
// 10. 경로 그리기
// ===============================
function drawPath(path){

  if(pathLine){
    map.removeLayer(pathLine);
  }

  const latlngs = path.map(p=>{
    const [lat,lng] = p.split(",").map(Number);
    return [lat,lng];
  });

  pathLine = L.polyline(latlngs, {
    color: "blue",
    weight: 5
  }).addTo(map);
}

// ===============================
// 11. 클릭 이벤트 (전체 통합)
// ===============================
map.on("click", function(e){

  if(wptMarkers.length === 0){
    alert("WPT 로딩 중");
    return;
  }

  const clicked = { lat:e.latlng.lat, lng:e.latlng.lng };

  // 1. 가장 가까운 WPT 찾기
  let nearest = null;
  let minDist = Infinity;

  wptMarkers.forEach(w=>{
    const d = getDistance(clicked, w);
    if(d < minDist){
      minDist = d;
      nearest = w;
    }
  });

  // 2. 마커 강조
  if(lastSelectedMarker){
    lastSelectedMarker.setIcon(blueIcon);
  }

  nearest.marker.setIcon(redIcon);
  nearest.marker.openPopup();
  lastSelectedMarker = nearest.marker;

  // 3. 경로 계산
  const startNode = findNearestNode(clicked.lat, clicked.lng);
  const endNode = findNearestNode(nearest.lat, nearest.lng);

  const path = findShortestPath(startNode, endNode);

  drawPath(path);

  // 4. 팝업 표시
  if(lastPopup) map.closePopup(lastPopup);

  lastPopup = L.popup()
    .setLatLng(e.latlng)
    .setContent("📍 목표: " + nearest.name)
    .openOn(map);
});

</script>

</body>
</html>
